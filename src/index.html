<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StheshMusic Player</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    
    <style>
        :root {
            --bg-main: #121212;
            --bg-surface: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a7a7a7;
            --accent: #1db954;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-top: env(safe-area-inset-top, 20px); padding-bottom: calc(145px + env(safe-area-inset-bottom, 0px)); }
        .mobile-header { padding: 16px 16px 12px 16px; display: flex; flex-direction: column; gap: 14px; background: linear-gradient(180deg, rgba(29,185,84,0.15) 0%, rgba(18,18,18,0) 100%); }
        .brand-section { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .brand-title { display: flex; align-items: center; gap: 10px; }
        .app-logo { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; }
        .brand-section h1 { font-size: 1.35rem; margin: 0; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .btn-import { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); color: var(--text-main); font-size: 0.8rem; font-weight: 600; padding: 6px 12px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-import:active { background: rgba(255, 255, 255, 0.2); }
        .btn-import svg { width: 14px; height: 14px; fill: currentColor; }
        .input-box { display: flex; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 8px 12px; align-items: center; gap: 8px; width: 100%; }
        .input-box input { background: none; border: none; color: var(--text-main); width: 100%; outline: none; font-size: 0.95rem; }
        .playlist-banner { display: flex; align-items: center; gap: 16px; padding: 0 16px; margin-top: 8px; }
        .playlist-art { width: 70px; height: 70px; background: #282828; display: flex; align-items: center; justify-content: center; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .playlist-art img { width: 100%; height: 100%; object-fit: cover; }
        .playlist-info h2 { font-size: 1.25rem; margin: 0 0 4px 0; font-weight: 700; }
        .playlist-meta { color: var(--text-muted); font-size: 0.8rem; }
        .track-list-container { margin-top: 16px; padding: 0 8px; }
        .track-row { display: flex; align-items: center; padding: 12px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; }
        .track-row:active { background: rgba(255, 255, 255, 0.05); }
        .track-row.active { background: rgba(29, 185, 84, 0.12); }
        .track-row.active .track-search-title { color: var(--accent); font-weight: 600; }
        .col-num { width: 35px; font-size: 0.9rem; color: var(--text-muted); }
        .col-title { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .track-search-title { font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-node-tag { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background-color: var(--bg-surface); border-top: 1px solid #262626; display: flex; flex-direction: column; padding: 12px 16px calc(10px + env(safe-area-inset-bottom, 0px)) 16px; z-index: 999; box-shadow: 0 -8px 24px rgba(0,0,0,0.6); }
        .player-upper-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .player-meta-display { display: flex; align-items: center; gap: 10px; width: 85%; overflow: hidden; }
        .player-mini-logo { width: 28px; height: 28px; border-radius: 4px; object-fit: cover; }
        .track-details { overflow: hidden; }
        .track-title-display { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-controls-row { display: flex; align-items: center; justify-content: center; margin-top: 2px; }
        .control-buttons { display: flex; align-items: center; gap: 16px; }
        .btn { background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; padding: 0; }
        .btn svg { width: 18px; height: 18px; fill: currentColor; }
        .btn-play { background-color: var(--text-main); color: #000000; width: 44px; height: 44px; border-radius: 50%; }
        .btn-play svg { width: 16px; height: 16px; margin-left: 2px; }
        .btn-play.playing svg { margin-left: 0; }
        .btn.active { color: var(--accent); }
        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; }
        .progress-bar-wrapper { flex: 1; height: 24px; display: flex; align-items: center; cursor: pointer; position: relative; }
        .progress-bar-bg { width: 100%; height: 6px; background-color: #3e3e3e; border-radius: 3px; position: relative; pointer-events: none; }
        .progress-bar-fill { height: 100%; width: 0%; background-color: var(--accent); border-radius: 3px; position: absolute; left: 0; top: 0; pointer-events: none; }
    </style>
  <style>#local-tracks-container, .playlist-container, ul { max-height: 350px !important; overflow-y: auto !important; -webkit-overflow-scrolling: touch !important; } body, div, span, li { color: #ffffff !important; text-shadow: 0 1px 2px rgba(0,0,0,0.8); } .track-item { background: rgba(255,255,255,0.1) !important; margin: 5px 0; padding: 10px; border-radius: 4px; }</style>
</head>
<body>
    <div class="app-container">
        <div class="mobile-header">
            <div class="brand-section">
                <div class="brand-title">
                    <img src="assets/icon/favicon.png" class="app-logo" onerror="this.style.display='none';">
                    <h1>StheshMusic</h1>
                </div>
                <input type="file" id="storage-grabber" multiple accept="audio/*" style="display: none;">
                <button class="btn-import" onclick="document.getElementById('storage-grabber').click()">
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    Import Audio
                </button>
            </div>
            <div class="input-box">
                <input type="text" id="local-filter" placeholder="Search tracks...">
            </div>
        </div>
        <div class="playlist-banner">
            <div class="playlist-art">
                <img src="assets/icon/favicon.png" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\' fill=\'%231db954\'><circle cx=\'50\' cy=\'50\' r=\'40\'/></svg>';">
            </div>
            <div class="playlist-info">
                <h2>Local Files Package</h2>
                <div class="playlist-meta"><span id="local-count">0</span> tracks total loaded</div>
            </div>
        </div>
        <div class="track-list-container"><div id="local-wrapper"></div></div>
    </div>
    <div class="player-bar">
        <audio id="audio-engine" preload="auto"></audio>
        <div class="player-upper-row">
            <div class="player-meta-display">
                <img src="assets/icon/favicon.png" class="player-mini-logo" onerror="this.style.display='none';">
                <div class="track-details"><div class="track-title-display" id="display-title">No track selected</div></div>
            </div>
            <button class="btn" id="ctrl-mute">
                <svg id="svg-volume" viewBox="0 0 24 24"><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zm-3 1.77L6.43 9H3v6h3.43L11 19V5z"/></svg>
            </button>
        </div>
        <div class="progress-container">
            <span id="time-current">0:00</span>
            <div class="progress-bar-wrapper" id="progress-wrapper">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
            </div>
            <span id="time-total">0:00</span>
        </div>
        <div class="player-controls-row">
            <div class="control-buttons">
                <button class="btn" id="ctrl-shuffle" title="Shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.45 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                <button class="btn" id="ctrl-prev" title="Previous Track"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="btn" id="ctrl-rewind" title="Rewind 10s"><svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg></button>
                <button class="btn btn-play" id="ctrl-play" title="Play/Pause">
                    <svg id="svg-play-action" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="btn" id="ctrl-forward" title="Fast Forward 10s"><svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg></button>
                <button class="btn" id="ctrl-next" title="Next Track"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6z"/></svg></button>
                <button class="btn" id="ctrl-repeat" title="Repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v3h12v-6h-2v4z"/></svg></button>
            </div>
        </div>
    </div>

        document.addEventListener("DOMContentLoaded", () => {
            const audio = document.getElementById('audio-engine');
            const localWrapper = document.getElementById('local-wrapper');
            const btnPlay = document.getElementById('ctrl-play');
            const svgPlayAction = document.getElementById('svg-play-action');
            const btnPrev = document.getElementById('ctrl-prev');
            const btnNext = document.getElementById('ctrl-next');
            const btnForward = document.getElementById('ctrl-forward');
            const btnRewind = document.getElementById('ctrl-rewind');
            const btnShuffle = document.getElementById('ctrl-shuffle');
            const btnRepeat = document.getElementById('ctrl-repeat');
            const btnMute = document.getElementById('ctrl-mute');
            const svgVolume = document.getElementById('svg-volume');
            const displayTitle = document.getElementById('display-title');
            const timeCurrent = document.getElementById('time-current');
            const timeTotal = document.getElementById('time-total');
            const progressWrapper = document.getElementById('progress-wrapper');
            const progressFill = document.getElementById('progress-fill');
            const localFilter = document.getElementById('local-filter');
            const localCount = document.getElementById('local-count');
            const storageGrabber = document.getElementById('storage-grabber');

            let allTracks = [];
            let currentIndex = -1;
            let isShuffle = false;
            let isRepeat = false;
            let isMuted = false;
            let playbackQueue = [];

            internalTracks.forEach((filename) => {
                allTracks.push({
                    title: filename.replace(/\.[^/.]+$/, ""),
                    src: 'http://localhost/assets/' + encodeURIComponent(filename),
                    tag: 'Offline Audio Track',
                    isBlob: false
                });
            });

            function renderTracklist() {
                localWrapper.innerHTML = '';
                allTracks.forEach((track, i) => {
                    const row = document.createElement('div');
                    row.className = 'track-row';
                    if (i === currentIndex) row.classList.add('active');
                    row.innerHTML = `
                        <div class="col-num">${i + 1}</div>
                        <div class="col-title">
                            <span class="track-search-title">${track.title}</span>
                            <span class="track-node-tag">${track.tag}</span>
                        </div>
                    `;
                    row.addEventListener('click', () => selectTrack(i));
                    localWrapper.appendChild(row);
                });
                localCount.textContent = allTracks.length;
                updateQueue();
            }

            storageGrabber.addEventListener('change', (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const objectUrl = URL.createObjectURL(file);
                    allTracks.push({
                        title: file.name.replace(/\.[^/.]+$/, ""),
                        src: objectUrl,
                        tag: 'Imported Device File',
                        isBlob: true
                    });
                });
                renderTracklist();
            });

            function updateQueue() {
                const query = localFilter.value.toLowerCase().trim();
                const rows = Array.from(document.querySelectorAll('.track-row'));
                playbackQueue = [];
                
                allTracks.forEach((track, i) => {
                    const match = track.title.toLowerCase().includes(query);
                    if (rows[i]) rows[i].style.display = match ? 'flex' : 'none';
                    if (match) playbackQueue.push(i);
                });
            }

            localFilter.addEventListener('input', updateQueue);

            function selectTrack(index) {
                if (index < 0 || index >= allTracks.length) return;
                currentIndex = index;
                
                const rows = Array.from(document.querySelectorAll('.track-row'));
                rows.forEach(row => row.classList.remove('active'));
                if (rows[currentIndex]) rows[currentIndex].classList.add('active');
                
                const currentTrack = allTracks[currentIndex];
                displayTitle.textContent = currentTrack.title;
                
                timeTotal.textContent = "0:00"; // Reset view on track load
                audio.src = currentTrack.src;
                audio.play().catch(e => console.log("Playback interaction lock: ", e));
                
                btnPlay.classList.add('playing');
                svgPlayAction.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            }

            function nextTrack() {
                if (isRepeat) { audio.currentTime = 0; audio.play(); return; }
                let qIndex = playbackQueue.indexOf(currentIndex);
                if (qIndex !== -1 && qIndex + 1 < playbackQueue.length) {
                    selectTrack(playbackQueue[qIndex + 1]);
                } else if (playbackQueue.length > 0) {
                    selectTrack(playbackQueue[0]);
                }
            }

            function prevTrack() {
                if (audio.currentTime > 3) { audio.currentTime = 0; return; }
                let qIndex = playbackQueue.indexOf(currentIndex);
                if (qIndex > 0) {
                    selectTrack(playbackQueue[qIndex - 1]);
                } else if (playbackQueue.length > 0) {
                    selectTrack(playbackQueue[playbackQueue.length - 1]);
                }
            }

            btnForward.addEventListener('click', () => {
                if (audio.duration && isFinite(audio.duration)) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
            });

            btnRewind.addEventListener('click', () => {
                if (audio.duration && isFinite(audio.duration)) audio.currentTime = Math.max(0, audio.currentTime - 10);
            });

            btnPlay.addEventListener('click', () => {
                if (currentIndex === -1 && playbackQueue.length > 0) { selectTrack(playbackQueue[0]); return; }
                if (audio.paused) {
                    audio.play();
                    btnPlay.classList.add('playing');
                    svgPlayAction.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                } else {
                    audio.pause();
                    btnPlay.classList.remove('playing');
                    svgPlayAction.innerHTML = '<path d="M8 5v14l11-7z"/>';
                }
            });

            btnNext.addEventListener('click', nextTrack);
            btnPrev.addEventListener('click', prevTrack);

            btnShuffle.addEventListener('click', () => {
                isShuffle = !isShuffle;
                btnShuffle.classList.toggle('active', isShuffle);
                if (isShuffle) {
                    for (let i = playbackQueue.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [playbackQueue[i], playbackQueue[j]] = [playbackQueue[j], playbackQueue[i]];
                    }
                } else {
                    updateQueue();
                }
            });

            btnRepeat.addEventListener('click', () => {
                isRepeat = !isRepeat;
                btnRepeat.classList.toggle('active', isRepeat);
            });

            btnMute.addEventListener('click', () => {
                isMuted = !isMuted;
                audio.muted = isMuted;
                if (isMuted) {
                    svgVolume.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zm-3 1.77L6.43 9H3v6h3.43L11 19v-5.73l4.24 4.24c-.64.47-1.34.86-2.11 1.11v2.06c1.3-.3 2.49-.93 3.51-1.76l2.97 2.97L21 20.73 4.27 3zM11 5.82l-.49.49L7.43 9H7v4.73l2.4 2.4.4-.4.2-.2V5.82z"/>';
                } else {
                    svgVolume.innerHTML = '<path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zm-3 1.77L6.43 9H3v6h3.43L11 19V5z"/>';
                }
            });

            function formatTime(secs) {
                if (isNaN(secs) || !isFinite(secs)) return '0:00';
                const m = Math.floor(secs / 60);
                const s = Math.floor(secs % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            }

            audio.addEventListener('timeupdate', () => {
                // Force recalculate fallback if browser engine initially missed the stream metadata headers
                if (audio.duration && isFinite(audio.duration)) {
                    const pct = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = `${pct}%`;
                    timeTotal.textContent = formatTime(audio.duration);
                }
                timeCurrent.textContent = formatTime(audio.currentTime);
            });

            // Double security hooks for complex storage file duration calculation
            audio.addEventListener('loadedmetadata', () => {
                if (audio.duration && isFinite(audio.duration)) {
                    timeTotal.textContent = formatTime(audio.duration);
                }
            });
            
            audio.addEventListener('durationchange', () => {
                if (audio.duration && isFinite(audio.duration)) {
                    timeTotal.textContent = formatTime(audio.duration);
                }
            });

            audio.addEventListener('ended', nextTrack);

            function seekTrack(e) {
                if (!audio.duration || !isFinite(audio.duration)) return;
                const rect = progressWrapper.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let pct = (clientX - rect.left) / rect.width;
                pct = Math.max(0, Math.min(1, pct));
                audio.currentTime = pct * audio.duration;
            }
            progressWrapper.addEventListener('click', seekTrack);

            renderTracklist();
        });
    </script>
</body>
</html>
