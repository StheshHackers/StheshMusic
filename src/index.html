<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StheshMusic Player</title>
  <style>
    body { background: #121212 !important; color: #ffffff !important; font-family: sans-serif !important; margin: 0; user-select: none; }
    .app-header { background: #121212; padding: 20px; text-align: center; }
    .app-logo { max-width: 60px; }
    h1 { color: #1db954 !important; margin: 5px 0; }
    .player-controls-box { position: fixed; bottom: 0; left: 0; right: 0; background: #181818; padding: 15px 20px 30px; border-top: 1px solid #282828; }
    #progress-slider { width: 100%; cursor: pointer; }
    .control-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
    .btn { background: none; border: none; cursor: pointer; }
    .btn svg { fill: #1db954 !important; width: 40px; height: 40px; }
  </style>
</head>
<body>
    <div class="app-header"><img src="http://localhost/assets/icon/favicon.png" class="app-logo"><h1>StheshMusic</h1></div>
    <div id="local-tracks-container" style="height: 50vh; overflow-y: auto; padding: 10px;">
        <ul id="playlist-element" style="list-style: none; padding: 0;"></ul>
    </div>
    <audio id="audio-engine" preload="auto"></audio>
    <div class="player-controls-box">
        <div id="current-track-display" style="text-align: center; color: #1db954; margin-bottom: 10px;">Select a track</div>
        <input type="range" id="progress-slider" min="0" max="100" value="0">
        <div class="control-buttons">
            <button class="btn" id="ctrl-prev">Prev</button>
            <button class="btn" id="ctrl-play-pause">Play/Pause</button>
            <button class="btn" id="ctrl-next">Next</button>
        </div>
    </div>
    <script>
        const audio = document.getElementById('audio-engine');
        const display = document.getElementById('current-track-display');
        const tracks = ["100 Bars- Big Zulu.mp3", "ANGISAFUNI.mp3"]; // truncated for brevity
        let currentIndex = 0;

        function playTrack(index) {
            currentIndex = index;
            const name = tracks[index];
            audio.src = 'http://localhost/assets/' + encodeURIComponent(name);
            display.textContent = name;
            audio.play();

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({ title: name, artist: 'StheshMusic' });
                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => { currentIndex--; playTrack(currentIndex); });
                navigator.mediaSession.setActionHandler('nexttrack', () => { currentIndex++; playTrack(currentIndex); });
            }
        }
        document.getElementById('ctrl-play-pause').onclick = () => audio.paused ? audio.play() : audio.pause();
        playTrack(0);
    </script>
</body>
</html>
