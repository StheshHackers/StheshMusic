<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StheshMusic Player</title>
  <style>
    body { 
      background: #121212 !important; 
      color: #ffffff !important; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important; 
      margin: 0; 
      padding: 0; 
      user-select: none;
    }
    .app-header { 
      background: linear-gradient(to bottom, #1e1e1e, #121212); 
      padding: 20px; 
      text-align: center; 
      border-bottom: 1px solid #282828; 
    }
    .app-logo { 
      max-width: 60px; 
      margin-bottom: 10px; 
    }
    h1 { 
      font-size: 1.6rem !important; 
      color: #1db954 !important; 
      font-weight: 700; 
      margin: 5px 0 0 0; 
    }
    .search-box-container { 
      padding: 15px 15px 5px 15px; 
      background: #121212;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #local-filter { 
      flex-grow: 1;
      background: #282828 !important; 
      border: 1px solid transparent !important; 
      color: #ffffff !important; 
      padding: 12px 16px; 
      border-radius: 25px; 
      font-size: 0.95rem; 
      box-sizing: border-box; 
    }
    #local-filter:focus { 
      border-color: #1db954 !important; 
      outline: none; 
    }
    .import-btn {
      background: #282828;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .import-btn svg {
      fill: #1db954 !important;
      width: 24px;
      height: 24px;
    }
    .playlist-meta {
      padding: 5px 20px;
      color: #b3b3b3;
      font-size: 0.85rem;
    }
    #local-tracks-container { 
      height: calc(100vh - 340px) !important; 
      overflow-y: auto !important; 
      padding: 10px 15px !important; 
      margin-bottom: 160px;
      -webkit-overflow-scrolling: touch !important; 
    }
    #local-tracks-container::-webkit-scrollbar { 
      width: 6px; 
    }
    #local-tracks-container::-webkit-scrollbar-thumb { 
      background: #333; 
      border-radius: 3px; 
    }
    .track-item { 
      display: flex; 
      align-items: center; 
      background: #181818 !important; 
      margin-bottom: 8px !important; 
      padding: 14px 16px !important; 
      border-radius: 8px !important; 
      border: 1px solid #282828 !important; 
    }
    .track-item:active { 
      background: #282828 !important; 
    }
    .track-item.active-playing {
      border-color: #1db954 !important;
      background: #202c24 !important;
    }
    .track-item .track-meta { 
      flex-grow: 1; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      white-space: nowrap; 
      color: #ffffff !important; 
      font-size: 0.95rem; grading: border-box;
    }
    .track-item.active-playing .track-meta {
      color: #1db954 !important;
      font-weight: 600;
    }
    .track-item .track-tag { 
      color: #b3b3b3 !important; 
      font-size: 0.75rem; 
      margin-left: 10px; 
      border: 1px solid #404040;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .track-item.active-playing .track-tag {
      color: #1db954 !important;
      border-color: #1db954 !important;
    }
    .player-controls-box { 
      position: fixed; 
      bottom: 0; 
      left: 0; 
      right: 0; 
      background: #181818 !important; 
      border-top: 1px solid #282828; 
      padding: 10px 20px 30px 20px; 
      box-shadow: 0 -5px 15px rgba(0,0,0,0.6); 
      z-index: 999; 
    }
    .now-playing-banner {
      text-align: center;
      padding: 4px 10px 10px 10px;
      font-size: 0.9rem;
      color: #1db954;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-bottom: 1px solid #282828;
      margin-bottom: 10px;
    }
    .playback-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #b3b3b3;
      font-size: 0.75rem;
      margin-bottom: 10px;
    }
    .control-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }
    .btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px;
    }
    .btn svg { 
      fill: #ffffff !important; 
      width: 26px; 
      height: 26px; 
    }
    .btn:active svg { 
      fill: #1db954 !important; 
    }
    #ctrl-play-pause svg {
      width: 40px;
      height: 40px;
      fill: #1db954 !important;
    }
  </style>
</head>
<body>

    <div class="app-header">
        <img src="http://localhost/assets/icon/favicon.png" class="app-logo" onerror="this.src='assets/icon/favicon.png';">
        <h1>StheshMusic</h1>
    </div>

    <div class="search-box-container">
        <input type="text" id="local-filter" placeholder="Search tracks...">
        <input type="file" id="storage-grabber" multiple accept="audio/*" style="display: none;">
        <button class="import-btn" id="trigger-import" title="Import Audio">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
    </div>
    
    <div class="playlist-meta"><span id="local-count">0</span> tracks total loaded</div>

    <div id="local-tracks-container">
        <ul id="playlist-element" style="list-style: none; padding: 0; margin: 0;"></ul>
    </div>

    <audio id="audio-engine" preload="auto"></audio>

    <div class="player-controls-box">
        <div class="now-playing-banner" id="current-track-display">No Track Playing</div>
        <div class="playback-bar">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
        </div>
        <div class="control-buttons">
            <button class="btn" id="ctrl-shuffle" title="Shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.45 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
            <button class="btn" id="ctrl-prev" title="Previous Track"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="btn" id="ctrl-play-pause"><svg id="svg-play-action" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="btn" id="ctrl-next" title="Next Track"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6z"/></svg></button>
            <button class="btn" id="ctrl-repeat" title="Repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v3h12v-6h-2v4z"/></svg></button>
        </div>
    </div>

            "Yimowakho Dali (u X5 ft Shenge WaseHlalankosi & Masothole) _1759466100912.mp3",
            "amadodenu by Menzi.mp3",
            "iDliso 2 (feat. Shenge Wasehlalankosi)_1759381317507.mp3",
            "iVALENTiNE  feat  Shenge wasehlalankosi .mp3",
            "iZindlu Zodaka (feat. Shenge Wasehlalankosi).mp3",
            "intaba Zokhahlamba  feat  Shenge Wasehlalankosi  Mjolisi .mp3",
            "saqala sadlala.mp3",
            "uCapitec (feat. Shenge wasehlalankosi)_1759465811587.mp3",
            "wamnika kanjani.mp3"
        ];

        const audio = document.getElementById('audio-engine');
        const playlistElement = document.getElementById('playlist-element');
        const localCount = document.getElementById('local-count');
        const localFilter = document.getElementById('local-filter');
        const ctrlPlayPause = document.getElementById('ctrl-play-pause');
        const svgPlayAction = document.getElementById('svg-play-action');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        const storageGrabber = document.getElementById('storage-grabber');
        const triggerImport = document.getElementById('trigger-import');
        const currentTrackDisplay = document.getElementById('current-track-display');

        let allTracks = [];
        let currentIndex = -1;

        internalTracks.forEach((filename) => {
            allTracks.push({
                name: filename.replace(/\.[^/.]+$/, ""),
                src: 'http://localhost/assets/' + encodeURIComponent(filename),
                tag: 'App Asset'
            });
        });

        function renderPlaylist(tracksToRender) {
            playlistElement.innerHTML = '';
            localCount.textContent = tracksToRender.length;
            tracksToRender.forEach((track) => {
                const origIndex = allTracks.findIndex(t => t.src === track.src);
                const li = document.createElement('li');
                li.className = 'track-item';
                if (origIndex === currentIndex) {
                    li.className += ' active-playing';
                }
                li.innerHTML = `<div class="track-meta">${track.name}</div><div class="track-tag">${track.tag}</div>`;
                li.addEventListener('click', () => playTrack(origIndex));
                playlistElement.appendChild(li);
            });
        }

        function playTrack(index) {
            if (index < 0 || index >= allTracks.length) return;
            currentIndex = index;
            currentTrackDisplay.textContent = allTracks[currentIndex].name;
            audio.src = allTracks[currentIndex].src;
            audio.play().catch(e => console.log("Playback interaction lock: ", e));
            svgPlayAction.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            
            // Re-render to update the visual highlighting on the items
            const query = localFilter.value.toLowerCase();
            const filtered = allTracks.filter(t => t.name.toLowerCase().includes(query));
            renderPlaylist(filtered);
        }

        ctrlPlayPause.addEventListener('click', () => {
            if (audio.paused) {
                if (currentIndex === -1 && allTracks.length > 0) {
                    playTrack(0);
                } else {
                    audio.play();
                    svgPlayAction.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                }
            } else {
                audio.pause();
                svgPlayAction.innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        });

        document.getElementById('ctrl-next').addEventListener('click', () => {
            let next = currentIndex + 1;
            if (next >= allTracks.length) next = 0;
            playTrack(next);
        });

        document.getElementById('ctrl-prev').addEventListener('click', () => {
            let prev = currentIndex - 1;
            if (prev < 0) prev = allTracks.length - 1;
            playTrack(prev);
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration && isFinite(audio.duration)) {
                timeCurrent.textContent = formatTime(audio.currentTime);
                timeTotal.textContent = formatTime(audio.duration);
            }
        });

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        localFilter.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allTracks.filter(t => t.name.toLowerCase().includes(query));
            renderPlaylist(filtered);
        });

        triggerImport.addEventListener('click', () => {
            storageGrabber.click();
        });

        storageGrabber.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach((file) => {
                const objectUrl = URL.createObjectURL(file);
                allTracks.unshift({
                    name: file.name.replace(/\.[^/.]+$/, ""),
                    src: objectUrl,
                    tag: 'Storage'
                });
            });
            renderPlaylist(allTracks);
            if (files.length > 0) playTrack(0);
        });

        renderPlaylist(allTracks);
    </script>
</body>
</html>
