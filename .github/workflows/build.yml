name: Build StheshMusic APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '21' }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Build and Sync
        run: |
          npm ci --legacy-peer-deps
          npm run build
          rm -rf android && npx cap add android && npx cap sync android
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />' android/app/src/main/AndroidManifest.xml
      - name: Compile APK
        run: cd android && ./gradlew assembleDebug
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with: { name: StheshMusic-Offline, path: android/app/build/outputs/apk/debug/app-debug.apk }
